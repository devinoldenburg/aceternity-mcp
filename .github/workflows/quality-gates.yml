name: Quality Gates

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff mypy pytest pytest-cov build bandit

      - name: Lint with Ruff
        run: |
          ruff check src/ tests/ --select=E,F
          ruff format src/ tests/ --check

      - name: Type check with MyPy
        run: |
          mypy src/aceternity_mcp/ --ignore-missing-imports --disable-error-code=misc

      - name: Security scan with Bandit
        run: |
          bandit -r src/aceternity_mcp/ -c pyproject.toml

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short

      - name: Generate coverage report
        run: |
          pytest --cov=src/aceternity_mcp --cov-report=xml tests/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Build package
        run: |
          python -m build --wheel --sdist

      - name: Validate registry
        run: |
          python scripts/validate_registry.py

      - name: Test imports
        run: |
          python -c "from aceternity_mcp import cli, server, install, uninstall"

  all-python-versions-pass:
    needs: quality-gates
    runs-on: ubuntu-latest
    steps:
      - run: echo "✅ All Python versions passed quality gates"

name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff mypy pytest pytest-cov build bandit

      - name: Lint with Ruff
        run: ruff check src/ tests/ --select=E,F && ruff format src/ tests/ --check

      - name: Type check with MyPy
        run: mypy src/aceternity_mcp/ --ignore-missing-imports --disable-error-code=misc

      - name: Security scan with Bandit
        run: bandit -r src/aceternity_mcp/ -c pyproject.toml

      - name: Run all tests
        run: pytest tests/ -v --tb=short

      - name: Check coverage
        run: pytest --cov=src/aceternity_mcp tests/

      - name: Build package
        run: python -m build --wheel --sdist

      - name: Validate registry
        run: python scripts/validate_registry.py

  publish:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/aceternity-mcp
    permissions:
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build --wheel --sdist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

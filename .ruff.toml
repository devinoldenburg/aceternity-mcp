# Ruff configuration
target-version = "py310"
line-length = 88

[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "PTH",    # flake8-use-pathlib
    "ERA",    # eradicate (commented-out code)
    "PL",     # Pylint
    "RUF",    # Ruff-specific rules
    "S",      # flake8-bandit (security)
    "DTZ",    # flake8-datetimez
    "ICN",    # flake8-import-conventions
    "PIE",    # flake8-pie
    "Q",      # flake8-quotes
    "RET",    # flake8-return
    "T10",    # flake8-debugger
    "YTT",    # flake8-2020
    "ANN",    # flake8-annotations (type hints)
]

ignore = [
    "PLR0913",  # Too many arguments
    "PLR2004",  # Magic value comparison
    "S101",     # Use of assert (allowed in tests)
    "PLC0415",  # Import at top-level (too strict for conditional imports)
    "PLR0911",  # Too many return statements
    "PLR0912",  # Too many branches
    "PLR0915",  # Too many statements
    "PLW0603",  # Using global statement
    "PLW1510",  # subprocess.run without check (acceptable in tests)
    "S110",     # try-except-pass (acceptable for cleanup code)
    "S108",     # insecure temp file (acceptable in tests)
    "ARG001",   # Unused function argument (acceptable for API compatibility)
    "ARG002",   # Unused method argument (acceptable for API compatibility)
    "DTZ005",   # datetime.now() without tz (acceptable for local timestamps)
    "PTH101",   # os.path.expanduser (acceptable alternative to Path.expanduser)
    "PTH123",   # open() vs Path.open() (stylistic preference)
    "PTH111",   # os.path.expanduser (acceptable alternative)
    "S603",     # subprocess call (acceptable when command is controlled)
    "S310",     # URL open (acceptable for PyPI API calls)
]

[lint.per-file-ignores]
"tests/*" = ["S101", "ARG", "ANN", "PLW1510", "S108"]
"scripts/*" = ["S101", "ANN", "PLR0911", "PLR0912", "E501", "ARG001", "SIM102", "S603"]
"src/aceternity_mcp/cli.py" = ["PLC0415", "PLR0915", "PLR0912", "PLR0911", "S310", "PTH101", "PTH123", "DTZ005"]
"src/aceternity_mcp/install.py" = ["PLC0415", "PTH111", "PTH123", "S603", "ARG001"]
"src/aceternity_mcp/server.py" = ["PLW0603"]
"src/aceternity_mcp/uninstall.py" = ["S110", "PTH123"]
"src/aceternity_mcp/registry.py" = ["ERA001"]
"src/aceternity_mcp/recommender.py" = ["ARG002", "E501"]

[lint.isort]
known-first-party = ["aceternity_mcp"]

[lint.pyupgrade]
keep-runtime-typing = true

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
